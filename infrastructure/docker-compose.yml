version: '3.8'

services:
  minio:
    image: minio/minio
    container_name: oslo_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ../data/minio:/data
    command: server /data --console-address ":9001"

  postgres:
    image: postgres:15
    container_name: oslo_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ../data/postgres:/var/lib/postgresql/data

  init-minio:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}) do 
        echo 'Waiting for MinIO...' && sleep 1; 
      done;
      /usr/bin/mc mb --ignore-existing local/bronze;
      /usr/bin/mc mb --ignore-existing local/silver;
      /usr/bin/mc mb --ignore-existing local/gold;
      exit 0;
      "