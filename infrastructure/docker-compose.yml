version: '3.8'

services:
  # S3-compatible storage for Medallion architecture layers
  minio:
    image: minio/minio
    container_name: oslo_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - ../data/minio:/data
    command: server /data --console-address ":9001"

  # Analytical storage for Gold layer and final aggregations
  postgres:
    image: postgres:15
    container_name: oslo_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: oslo_transit_db
    volumes:
      - ../data/postgres:/var/lib/postgresql/data

  # One-time setup: initializes MinIO buckets (Bronze, Silver, Gold)
  init-minio:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 admin password123) do 
        echo 'Waiting for MinIO...' && sleep 1; 
      done;
      /usr/bin/mc mb --ignore-existing local/bronze;
      /usr/bin/mc mb --ignore-existing local/silver;
      /usr/bin/mc mb --ignore-existing local/gold;
      exit 0;
      "